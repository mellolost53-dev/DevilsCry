<body>
    

    <div id="start-screen">
        <h2>DEVIL MAY CRY</h2>
        <button class="press-start-btn" onclick="initExperience()">Press Start</button>
    </div>

    <div id="video-container">
        <video id="main-video">
            <source src="assets/video/dmc_intro.mp4" type="video/mp4">
            Ваш браузер не підтримує відео.
        </video>
        <button class="skip-btn" onclick="showStory()">Skip Intro —></button>
    </div>

    <main id="story-page">
      <header class="main-header">
    <div class="logo-container">
        <img src="assets/image/dmc.png" alt="DMC Logo" class="nav-logo">
    </div>

    <div class="menu-toggle" id="mobile-menu">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
    </div>

    <nav class="nav-links">
        <a href="index.html" data-lang="nav_index"></a>
        <a href="weapons.html" data-lang="nav_chars"></a>
        <a href="music.html" data-lang="nav_music"></a>
        <a href="gallery.html" data-lang="nav_gallery"></a>
        <a href="story.html" data-lang="nav_story"></a>
        <a href="about.html" data-lang="nav_about"></a>
        
        <div class="mobile-lang">
            <button onclick="changeLang('ua')">UA</button>
            <button onclick="changeLang('en')">EN</button>
        </div>
    </nav>
</header>
        <h1 class="story-header" data-lang="story_title">The Legend of Sparda</h1>
        
        <div class="story-text-container">
            <p data-lang="story_full_1">
            </p>
            <p data-lang="story_full_2">            </p>
            
            <button class="re-watch-btn" onclick="replayIntro()">REWATCH INTRO</button>

            <a href="index.html" class="back-home">← RETURN TO MAIN MENU</a>
            
        </div>
    </main>

    <script>
        const startScreen = document.getElementById('start-screen');
        const videoContainer = document.getElementById('video-container');
        const video = document.getElementById('main-video');
        const storyPage = document.getElementById('story-page');

                                  // стар відео після кнопки
        function initExperience() {
            startScreen.style.display = 'none';
            videoContainer.style.display = 'block';
            video.play();
            
            // функція показу сторінки після фіні=ішу
            video.onended = function() {
                showStory();
            };
        }

        // Функція: Ховаємо відео, показуємо текст історії
        function showStory() {
            video.pause(); // пауза файлу
            videoContainer.style.display = 'none';
            storyPage.style.display = 'block';
            document.body.style.overflowY = 'auto'; // скрол текст
        }
        function replayIntro() {
    // сховка сторінки з текстом
    storyPage.style.display = 'none';
    document.body.style.overflowY = 'hidden'; 
    
    // шоу відео з нуля
    videoContainer.style.display = 'block';
    
    // скидаєм як щеплення відос
    video.currentTime = 0;
    video.play();
}
    </script>
    
    <script src="js/lang.js"></script>
